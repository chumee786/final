<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8">
    <title>Dollhouse</title>
    
     <!-- font: dm sans --->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <style>
      .dm-sans-<uniquifier> {
        font-family: "DM Sans", sans-serif;
        font-optical-sizing: auto;
        font-weight: <weight>;
        font-style: normal;
      }
      
      html {
        font-size: 16px;
      }
      
      body {
        background-color: #F5EAD4;
        width: 1440px;
        margin: 0;
        font-family: "DM Sans";
      }
      
       p {
        font-size: 1em;
      }
      
      h1 {
        font-size: 2.25em;
      }
      
      h2 {
        font-size: 1.5em;
      }
      
      #main-container {
        width: 1200px;
        margin: 60px auto;
        position: relative;
      }
      
      .top {
        display: flex;
        align-items: center;
        gap: 60px;
      }
      
      .top img {
        width: 124px;
      }
      
      #topbar {
        width: 100%;
        height: 60px;
        border: 4px solid #2A292A;
        border-radius: 10px;
        margin: 0 auto;
      }
      
      .section {
        width: 1200px;
        border: 4px solid #2A292A;
        border-radius: 10px;
        padding: 32px 32px 40px 32px;
        margin: 60px auto;
      }
      
      .section-title {
        margin: 0 0 28px 0;
      }
      
      .posters {
        display: flex;
        gap: 65px;
      }
      
      .game-poster {
        width: 145px;
        height: 220px;
      }
      
      .movie-poster {
        width: auto;
        height: 365px;
      }
      
      
    </style>
  </head>
  <body>
    <div id="main-container">
      <div class="top">
        <a href="index.html"> <img src="tv.png" alt="tv"> </a>
        
        <div id="topbar"> </div>
      </div>
      
      <div class="section">
        <h2 class="section-title">
          Games
        </h2>
        
        <div class="posters">
          <img src="skygame.png" alt="Sky" class="game-poster">
          <img src="volcanoprincess.png" alt="Volcano Princess" class="game-poster">
          <img src="dredge.png" alt="Dredge" class="game-poster">
          <img src="danganronpa.png" alt="Danganronpa" class="game-poster">
          <img src="stardew.png" alt="Stardew Valley" class="game-poster">
          <img src="stray.png" alt="Stray" class="game-poster">
        </div>
      </div>
      
      <div class="section">
        <h2 class="section-title">
          Movies
        </h2>
        
        <div class="posters">
          <img src="mammamia.png" alt="mamma mia movie" class="movie-poster">
          <img src="lalaland.png" alt="lalaland movie" class="movie-poster">
          <img src="coraline.png" alt="coraline movie" class="movie-poster">
          <img src="ratatouille.png" alt="ratatouille movie" class="movie-poster">
        </div>
      </div>
      
    </div>
  </body>
</html>
