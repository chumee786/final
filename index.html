<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8">
    <title>Welcome to my World</title>
    
    <!-- font: dm sans --->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <style>
      html {
        font-size: 16px;
      }
      
      body {
        background-color: #F5EAD4;
        margin: 0;
        font-family: "DM Sans", sans-serif;
        cursor: url('momongacursor2.png'), auto;
      }
      
      p {
        font-size: 1em;
      }
      
      h1 {
        font-size: 2.25em;
      }
      
      h2 {
        font-size: 1.5em;
      }
      
      #main-container {
        width: 1200px;
        margin: 60px auto;
        position: relative;
      }
      
      #topbar {
        width: 100%;
        height: 60px;
        border: 4px solid #2A292A;
        border-radius: 10px;
        margin: 0 auto;
      }
      
      #sidebar {
        position: fixed;
        top: 0;
        width: 200px;
        flex-direction: column;
        align-items: flex-start;
        padding-top: 180px;
        gap: 75px;
        display: flex;
      }
      
      #main {
        width: 1000px;
        padding-top: 0px;
        padding-left: 200px;
        margin-right: 120px;
      }
      
      .textblock {
        margin: 253px 0;
        display: flex;
        flex-direction: column;
      }
      
      .textblock a {
        text-decoration: none;
        color: black;
      }
      
      .textblock a:hover{
        font-size: 1.1em;
      }
      
      #id-card {
        width: 100%;
        height: 405px;
        border: 4px solid #2A292A;
        border-radius: 10px;
        display: flex;
        align-items: flex-start;
        gap: 80px;
      }
      
      .id-info {
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding-top: 20px;
        margin-bottom: 50px;
      }
      
      .info-group {
        display: flex;
        flex-direction: column;
        gap: 0px;
      }
      
      .info-group p {
        margin-bottom: 0px;
      }
      
      .grid {
        display: grid;
	        grid-template-columns: 50% 50%;
        width: 100%;
        gap: 40px;
        margin-top: 50px;
      }
      
      .grid div {
        width: 463px;
      }
      
      .grid img {
        width: 100%;
      }
      
      .sidebar img:hover {
        transform: scale(1.05);
        transition: transform 0.2s;
      }
       
      
      #sidebar img {
        width: 110px;
        height: auto;
      }
      
      #id-card img {
        padding: 30px 40px;
        display: block;
      }
      
    </style>
  </head>
  <body>
    <div id="main-container">
      <div id="topbar"> </div>
      <div id="sidebar">
  
        <a href="dollhouse.html"> <img src="house.png" alt="house icon"> </a>
       <a href="folder.html"> <img src="folder.png" alt="folder"> </a>
        <a href="vinyl.html"> <img src="vinyl.png" alt="vinyl"> </a>
        
      </div>
      <div id="main">
        <div class="textblock">
           <h2>Hello! Welcome to</h2>
          <h1>
            Grace's Collections of Things
          </h1>
          <a href="https://case-rem-92674462.figma.site/"     target="_blank" style="text-decoration: none;">
          Come see my portfolio!
          </a>

          <a href="mailto:g32liang@uwaterloo.ca" style="text-decoration: none;">
          Or send me an email!
          </a>
        </div>
        
        <div id="id-card">
          <img src="character.png" alt="me">
          <div class="id-info">
            <div class="info-group">
              <p>Name</p>
              <h2>Grace Liang</h2>
            </div>
            
            <div class="info-group">
              <p>Height</p>
              <h2>160cm</h2>
            </div>
            
            <div class="info-group">
              <p>Birthday</p>
              <h2>11/17/2006</h2>
            </div>
          </div>
        </div>
        
        <div class="grid">
          <div>
              <img src="road.png" alt="road">
          </div>
          <div>
              <img src="building.png" alt="building">
          </div>
          <div>
            <img src="landscape.png" alt="landscape">
          </div>
          <div>
            <img src="sky.png" alt="sky">
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
